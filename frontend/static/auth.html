<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookbox - Auth Service</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Bookbox</div>
    <nav class="navlinks">
      <a href="/">Home</a><a href="/auth" class="active">Auth</a><a href="/user">User</a><a href="/follow">Follow</a><a href="/book">Book</a><a href="/social">Social</a><a href="/reviews">Reviews</a><a href="/shelves">Shelves</a>
    </nav>
  </header>

  <main class="layout single-col">
    <section class="panel">
      <h2>Auth Service</h2>
      <p class="muted">Manage account registration and JWT tokens.</p>
      <p id="auth-status" class="muted">Ready</p>
    </section>

    <section class="panel service-grid">
      <article class="panel-inner">
        <h3>Register</h3>
        <div class="stack">
          <input id="reg-email" placeholder="Email" />
          <input id="reg-username" placeholder="Username" />
          <input id="reg-fullname" placeholder="Full name" />
          <input id="reg-password" type="password" placeholder="Password" />
          <button id="register-btn">Register</button>
        </div>
      </article>

      <article class="panel-inner">
        <h3>Login</h3>
        <div class="stack">
          <input id="login-username" placeholder="Username" />
          <input id="login-password" type="password" placeholder="Password" />
          <button id="login-btn">Login</button>
          <button id="verify-btn" class="ghost">Verify Token</button>
          <button id="logout-btn" class="ghost">Logout</button>
        </div>
      </article>
    </section>

    <section class="panel">
      <h3>Response</h3>
      <pre id="output" class="code-box">{}</pre>
    </section>
  </main>

  <script src="/static/common.js"></script>
  <script src="/static/auth.js"></script>
</body>
</html>
