<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookbox - Book Service</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Bookbox</div>
    <nav class="navlinks">
      <a href="/">Home</a><a href="/auth">Auth</a><a href="/user">User</a><a href="/follow">Follow</a><a href="/book" class="active">Book</a><a href="/social">Social</a><a href="/reviews">Reviews</a><a href="/shelves">Shelves</a>
    </nav>
  </header>

  <main class="layout single-col">
    <section class="panel">
      <h2>Book Service</h2>
      <p id="status" class="muted">Search and inspect books/authors/publishers.</p>
    </section>

    <section class="panel service-grid">
      <article class="panel-inner">
        <h3>Books</h3>
        <div class="stack">
          <input id="book-query" placeholder="Search query" />
          <button id="search-btn">Search books</button>
          <button id="list-btn" class="ghost">List books</button>
          <input id="isbn" placeholder="ISBN" />
          <button id="book-by-isbn-btn" class="ghost">Get by ISBN</button>
        </div>
      </article>

      <article class="panel-inner">
        <h3>Authors / Publishers</h3>
        <div class="stack">
          <input id="author-id" placeholder="Author id" />
          <button id="authors-btn">List authors</button>
          <button id="author-by-id-btn" class="ghost">Get author by id</button>
          <button id="publishers-btn" class="ghost">List publishers</button>
        </div>
      </article>
    </section>

    <section class="panel">
      <h3>Response</h3>
      <pre id="output" class="code-box">{}</pre>
    </section>
  </main>

  <script src="/static/common.js"></script>
  <script src="/static/book.js"></script>
</body>
</html>
