<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookbox - Home</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Bookbox</div>
    <nav class="navlinks">
      <a href="/" class="active">Home</a><a href="/auth">Auth</a><a href="/user">User</a><a href="/follow">Follow</a><a href="/book">Book</a><a href="/social">Social</a><a href="/reviews">Reviews</a><a href="/shelves">Shelves</a>
    </nav>
  </header>

  <main class="layout">
    <section class="panel auth-panel">
      <h2>Sign in</h2>
      <form id="login-form" class="stack">
        <input id="username" placeholder="Username" required />
        <input id="password" type="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
      <p id="auth-status" class="muted">Not authenticated</p>
    </section>

    <section class="panel">
      <div class="row-between">
        <h2>Books</h2>
        <button id="refresh-books" class="ghost">Refresh</button>
      </div>
      <div class="inline-input search-row">
        <input id="book-search" placeholder="Search books..." />
      </div>
      <div id="books-grid" class="cards"></div>
    </section>

    <section class="panel">
      <h2>Selected Book</h2>
      <p class="muted" id="selected-isbn">Select a book to interact</p>

      <div class="social-actions">
        <button id="like-book">Like Book</button>
        <div class="inline-input">
          <label for="rating">Rating</label>
          <select id="rating">
            <option value="0.5">0.5</option>
            <option value="1.0">1.0</option>
            <option value="1.5">1.5</option>
            <option value="2.0">2.0</option>
            <option value="2.5">2.5</option>
            <option value="3.0" selected>3.0</option>
            <option value="3.5">3.5</option>
            <option value="4.0">4.0</option>
            <option value="4.5">4.5</option>
            <option value="5.0">5.0</option>
          </select>
          <button id="rate-book">Rate</button>
        </div>
      </div>

      <div class="stack">
        <h3>Write review</h3>
        <input id="review-title" placeholder="Review title" />
        <textarea id="review-content" rows="4" placeholder="Share your thoughts..."></textarea>
        <button id="submit-review">Post Review</button>
      </div>

      <div class="stats" id="book-stats"></div>
    </section>
  </main>

  <script src="/static/common.js"></script>
  <script src="/static/home.js"></script>
</body>
</html>
