<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookbox - Social Service</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Bookbox</div>
    <nav class="navlinks">
      <a href="/">Home</a><a href="/auth">Auth</a><a href="/user">User</a><a href="/follow">Follow</a><a href="/book">Book</a><a href="/social" class="active">Social</a><a href="/reviews">Reviews</a><a href="/shelves">Shelves</a>
    </nav>
  </header>

  <main class="layout single-col">
    <section class="panel">
      <h2>Social Service</h2>
      <p id="status" class="muted">Likes, ratings, reviews, and shelf operations.</p>
    </section>

    <section class="panel service-grid">
      <article class="panel-inner">
        <h3>Book Social</h3>
        <div class="stack">
          <input id="isbn" placeholder="ISBN" />
          <button id="like-btn">Like book</button>
          <button id="stats-btn" class="ghost">Book stats</button>
          <select id="rating">
            <option value="0.5">0.5</option><option value="1.0">1.0</option><option value="1.5">1.5</option>
            <option value="2.0">2.0</option><option value="2.5">2.5</option><option value="3.0" selected>3.0</option>
            <option value="3.5">3.5</option><option value="4.0">4.0</option><option value="4.5">4.5</option><option value="5.0">5.0</option>
          </select>
          <button id="rate-btn" class="ghost">Rate book</button>
        </div>
      </article>

      <article class="panel-inner">
        <h3>Reviews</h3>
        <div class="stack">
          <input id="review-title" placeholder="Review title" />
          <textarea id="review-content" rows="3" placeholder="Review content"></textarea>
          <button id="review-btn">Create review</button>
          <button id="list-reviews-btn" class="ghost">List reviews</button>
        </div>
      </article>
    </section>

    <section class="panel">
      <h3>Response</h3>
      <pre id="output" class="code-box">{}</pre>
    </section>
  </main>

  <script src="/static/common.js"></script>
  <script src="/static/social.js"></script>
</body>
</html>
