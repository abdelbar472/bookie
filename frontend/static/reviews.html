<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookbox - Reviews</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Bookbox</div>
    <nav class="navlinks">
      <a href="/">Home</a><a href="/auth">Auth</a><a href="/user">User</a><a href="/follow">Follow</a><a href="/book">Book</a><a href="/social">Social</a><a href="/reviews" class="active">Reviews</a><a href="/shelves">Shelves</a>
    </nav>
  </header>

  <main class="layout">
    <section class="panel auth-panel">
      <h2>Session</h2>
      <form id="login-form" class="stack">
        <input id="username" placeholder="Username" required />
        <input id="password" type="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
      <p id="auth-status" class="muted">Not authenticated</p>

      <hr class="separator" />
      <h3>Choose book</h3>
      <input id="book-search" placeholder="Search title/author" />
      <div id="books-grid" class="stack"></div>
    </section>

    <section class="panel">
      <div class="row-between">
        <h2>Review Threads</h2>
        <span id="selected-isbn" class="muted">Select a book</span>
      </div>
      <div id="reviews" class="stack"></div>
    </section>
  </main>

  <template id="review-template">
    <article class="review-card">
      <div class="row-between">
        <strong class="review-title"></strong>
        <span class="muted review-meta"></span>
      </div>
      <p class="review-content"></p>
      <div class="review-actions">
        <button class="like-review">Like</button>
        <button class="reply-toggle ghost">Reply</button>
        <button class="thread-toggle ghost">Show replies</button>
        <span class="muted counters"></span>
      </div>
      <div class="reply-box hidden">
        <input class="reply-title" placeholder="Reply title" value="Reply" />
        <textarea class="reply-content" rows="2" placeholder="Write a reply..."></textarea>
        <button class="submit-reply">Post Reply</button>
      </div>
      <div class="replies stack"></div>
    </article>
  </template>

  <script src="/static/common.js"></script>
  <script src="/static/reviews.js"></script>
</body>
</html>
