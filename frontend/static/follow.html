<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookbox - Follow Service</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Bookbox</div>
    <nav class="navlinks">
      <a href="/">Home</a><a href="/auth">Auth</a><a href="/user">User</a><a href="/follow" class="active">Follow</a><a href="/book">Book</a><a href="/social">Social</a><a href="/reviews">Reviews</a><a href="/shelves">Shelves</a>
    </nav>
  </header>

  <main class="layout single-col">
    <section class="panel">
      <h2>Follow Service</h2>
      <p id="status" class="muted">Use integer user ids.</p>
    </section>

    <section class="panel service-grid">
      <article class="panel-inner">
        <h3>Actions</h3>
        <div class="stack">
          <input id="target-id" placeholder="Target user id (e.g. 2)" />
          <button id="follow-btn">Follow</button>
          <button id="unfollow-btn" class="ghost">Unfollow</button>
          <button id="check-btn" class="ghost">Check follow</button>
        </div>
      </article>

      <article class="panel-inner">
        <h3>Lists & Stats</h3>
        <div class="stack">
          <input id="stats-id" placeholder="User id" />
          <button id="stats-btn">Stats</button>
          <button id="followers-btn" class="ghost">Followers</button>
          <button id="following-btn" class="ghost">Following</button>
        </div>
      </article>
    </section>

    <section class="panel">
      <h3>Response</h3>
      <pre id="output" class="code-box">{}</pre>
    </section>
  </main>

  <script src="/static/common.js"></script>
  <script src="/static/follow.js"></script>
</body>
</html>
