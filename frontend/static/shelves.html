<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookbox - Shelves</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Bookbox</div>
    <nav class="navlinks">
      <a href="/">Home</a><a href="/auth">Auth</a><a href="/user">User</a><a href="/follow">Follow</a><a href="/book">Book</a><a href="/social">Social</a><a href="/reviews">Reviews</a><a href="/shelves" class="active">Shelves</a>
    </nav>
  </header>

  <main class="layout">
    <section class="panel auth-panel">
      <h2>Session</h2>
      <form id="login-form" class="stack">
        <input id="username" placeholder="Username" required />
        <input id="password" type="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
      <p id="auth-status" class="muted">Not authenticated</p>

      <hr class="separator" />
      <h3>Create shelf</h3>
      <div class="stack">
        <input id="shelf-name" placeholder="Shelf name" />
        <div class="inline-input">
          <select id="shelf-visibility">
            <option value="private">Private</option>
            <option value="public">Public</option>
          </select>
          <button id="create-shelf">Create</button>
        </div>
      </div>
      <div id="shelves-list" class="stack"></div>
    </section>

    <section class="panel">
      <h2>Manage shelf books</h2>
      <div class="inline-input search-row">
        <select id="shelf-pick"></select>
        <button id="refresh-shelf-books" class="ghost">View shelf books</button>
      </div>
      <div class="inline-input search-row">
        <input id="book-search" placeholder="Find a book to add/remove" />
      </div>
      <div id="books-grid" class="cards"></div>
      <p id="selected-isbn" class="muted">Select a book card below</p>
      <div class="inline-input search-row">
        <button id="add-to-shelf">Add selected book</button>
        <button id="remove-from-shelf" class="ghost">Remove selected book</button>
      </div>

      <hr class="separator" />
      <h3>Books inside selected shelf</h3>
      <div class="inline-input search-row">
        <label for="shelf-books-sort" class="muted">Sort</label>
        <select id="shelf-books-sort">
          <option value="position">Position</option>
          <option value="title">Title</option>
        </select>
        <button id="shelf-books-sort-dir" class="ghost">Asc</button>
      </div>
      <div id="shelf-books-list"></div>
    </section>
  </main>

  <script src="/static/common.js"></script>
  <script src="/static/shelves.js"></script>
</body>
</html>
