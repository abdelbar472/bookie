syntax = "proto3";

package follow;

// ──────────────────────────────────────────────────────────
//  FollowService  –  exposed by the Follow service
//  consumed by any downstream micro-service (e.g. User)
// ──────────────────────────────────────────────────────────
service FollowService {
  // Check whether follower_id follows followee_id
  rpc IsFollowing     (IsFollowingRequest)    returns (IsFollowingResponse);

  // Get follower + following counts for a user
  rpc GetFollowStats  (GetFollowStatsRequest) returns (GetFollowStatsResponse);

  // Get list of follower user_ids for a user
  rpc GetFollowers    (GetFollowListRequest)  returns (GetFollowListResponse);

  // Get list of following user_ids for a user
  rpc GetFollowing    (GetFollowListRequest)  returns (GetFollowListResponse);
}

// ── messages ───────────────────────────────────────────────

message IsFollowingRequest {
  int32 follower_id = 1;
  int32 followee_id = 2;
}

message IsFollowingResponse {
  bool following = 1;
}

message GetFollowStatsRequest {
  int32 user_id = 1;
}

message GetFollowStatsResponse {
  int32 user_id         = 1;
  int32 followers_count = 2;
  int32 following_count = 3;
}

message GetFollowListRequest {
  int32 user_id = 1;
  int32 skip    = 2;
  int32 limit   = 3;
}

message GetFollowListResponse {
  repeated int32 user_ids = 1;
  int32           total   = 2;
}

