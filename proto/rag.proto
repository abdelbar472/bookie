syntax = "proto3";

package rag;

// RAG service - consumed internally by Social and other services.
// Owns embedding/indexing for books and authors, and user preference updates from interactions.
service RagService {
  // Track user interaction on a specific book_id so RAG can update user taste/profile signals.
  rpc TrackInteraction (TrackInteractionRequest) returns (TrackInteractionResponse);
  // Index enriched book metadata (book + author style context) into the vector store.
  rpc IndexBooks (IndexBooksRequest) returns (IndexBooksResponse);
}

message TrackInteractionRequest {
  int32 user_id = 1;
  // Canonical book identifier sent by Social (e.g., ISBN/work_id depending on upstream service).
  string book_id = 2;
  string qdrant_id = 3;
  string interaction_type = 4;
  double value = 5;
}

message TrackInteractionResponse {
  bool success = 1;
  string message = 2;
}

message IndexBookPayload {
  string book_id = 1;
  string title = 2;
  string authors = 3;
  string description = 4;
  repeated string categories = 5;
  string language = 6;
  double average_rating = 7;
  int32 ratings_count = 8;
  string published_date = 9;
  string thumbnail = 10;
  string source = 11;
  string author_style = 12;
}

message IndexBooksRequest {
  repeated IndexBookPayload books = 1;
}

message IndexBooksResponse {
  int32 indexed = 1;
  int32 failed = 2;
  string message = 3;
}

