syntax = "proto3";

package rag;

// Retrieval-focused RAG service.
service RagService {
  // Index enriched book metadata into the vector store.
  rpc IndexBooks(IndexBooksRequest) returns (IndexBooksResponse);

  // Retrieve nearest neighbors for a given book id.
  rpc GetSimilarBooks(GetSimilarBooksRequest) returns (GetSimilarBooksResponse);

  // Semantic query against indexed vectors with optional filters.
  rpc SemanticSearch(SemanticSearchRequest) returns (SemanticSearchResponse);

  // Return an embedding vector for a specific indexed book.
  rpc GetBookEmbedding(GetBookEmbeddingRequest) returns (GetBookEmbeddingResponse);
}

message IndexBookPayload {
  string book_id = 1;
  string title = 2;
  string authors = 3;
  string description = 4;
  repeated string categories = 5;
  string language = 6;
  double average_rating = 7;
  int32 ratings_count = 8;
  string published_date = 9;
  string thumbnail = 10;
  string source = 11;
  string author_style = 12;
}

message IndexBooksRequest {
  repeated IndexBookPayload books = 1;
}

message IndexBooksResponse {
  int32 indexed = 1;
  int32 failed = 2;
  string message = 3;
}

message RetrievalCandidate {
  string book_id = 1;
  string title = 2;
  repeated string authors = 3;
  repeated string genres = 4;
  repeated string themes = 5;
  float score = 6;
}

message GetSimilarBooksRequest {
  string book_id = 1;
  int32 top_k = 2;
}

message GetSimilarBooksResponse {
  repeated RetrievalCandidate candidates = 1;
}

message SemanticSearchRequest {
  string query = 1;
  int32 top_k = 2;
  string entity_type = 3;
  string genre = 4;
  string author = 5;
}

message SemanticSearchResponse {
  repeated RetrievalCandidate candidates = 1;
}

message GetBookEmbeddingRequest {
  string book_id = 1;
}

message GetBookEmbeddingResponse {
  bool found = 1;
  repeated float vector = 2;
}
